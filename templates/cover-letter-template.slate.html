<!-- career-ops-template
name: Slate
description: Engineering classic: Helvetica, monochrome, full rules with a heavy name rule, compact.
version: 0.1.0
date: 2026-07-08
origin: reactive-resume/onyx
atsRisk: none
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter — {{NAME}}</title>
<style>
  /* Slate — engineering classic cover letter. Masthead matches the Slate CV:
     Helvetica, monochrome ink ramp, heavy name rule as the divider device. */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Disable fi/fl/ffi ligatures. Headless Chromium substitutes these letter
       pairs with the Unicode glyphs U+FB01/FB02/FB03 at PDF layout time, and PDF
       text extractors (what ATS systems read) decode them back to those
       codepoints, so "verification" becomes "veriﬁcation" and a literal keyword
       search misses it. Required ligatures (rlig) stay on. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'Helvetica Neue', Arial, 'Liberation Sans', 'DejaVu Sans', sans-serif;
    font-size: 11pt;
    line-height: 1.57;
    color: #1A1A1A;
    background: #ffffff;
    /* Disable ligatures here as well; see the * rule above. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  /* Masthead — identical voice to the Slate CV header. */
  .name {
    font-weight: 700;
    font-size: 24pt;
    color: #111;
    letter-spacing: 0.01em;
    line-height: 1.15;
    margin-bottom: 4px;
  }

  .contact, .credentials {
    font-size: 10pt;
    color: #333;
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .contact a, .credentials a, .footnotes a {
    color: #333;
    text-decoration: none;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* Slate's divider device: the CV's heavy name rule. */
  .divider {
    border: none;
    border-top: 2.5px solid #111;
    margin: 9px 0 12px;
  }

  /* Styled with the CV's section-title voice. */
  .role-title {
    font-weight: 700;
    font-style: normal;
    letter-spacing: normal;
    text-transform: none;
    color: #1A1A1A;
    margin-top: 14px;
    margin-bottom: 4px;
  }

  .dateline {
    font-size: 10pt;
    font-weight: 600;
    color: #111;
    margin-bottom: 16px;
  }

  .greeting {
    font-weight: 700;
    color: #111;
    margin-bottom: 11px;
  }

  p {
    margin-bottom: 8px;
  }

  .achievements {
    list-style: none;
    margin-bottom: 5px;
  }

  .achievements li {
    margin-bottom: 4px;
    padding-left: 11px;
    position: relative;
  }

  .achievements li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #1A1A1A;
  }

  .language-closing {
    font-style: italic;
    margin-top: 4px;
    margin-bottom: 8px;
  }

  .footnotes {
    margin-top: 12px;
    padding-top: 5px;
    border-top: 1px solid #333;
  }

  .footnotes p {
    font-size: 10pt;
    color: #555;
    line-height: 1.4;
    margin-bottom: 3px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

  /* === RTL (Arabic) Support === */
  html[lang="ar"] body {
    direction: rtl;
    text-align: right;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .achievements li {
    padding-right: 11px;
    padding-left: 0;
  }

  html[lang="ar"] .achievements li::before {
    right: 0;
    left: auto;
  }

  /* === CJK (Japanese) font fallback === */
  /* Latin theme stack first so ASCII still uses Helvetica; the browser's
     per-glyph fallback picks the first installed CJK face for kana and kanji. */
  html[lang="ja"] body {
    font-family: 'Helvetica Neue', Arial, 'Liberation Sans', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Noto Sans JP',
      Meiryo, 'MS PGothic', sans-serif;
  }
  /* Recipient address block (business-letter form). Ink only: accent is
     forbidden on letter furniture. When {{RECIPIENT_BLOCK}} is empty the whole
     element is absent (no box, no dangling label, no collapsed gap) and the
     dateline's own bottom margin carries the date -> Re: -> salutation rhythm. */
  .recipient {
    margin: 0 0 12pt;
    color: #1A1A1A;
    line-height: 1.45;
  }
  .recipient div {
    margin: 0;
  }
</style>
</head>
<body>
  <div class="name">{{NAME}}</div>
  <div class="contact">{{CONTACT_LINE}}</div>
  {{CREDENTIALS_BLOCK}}
  <hr class="divider">
  <div class="dateline">{{DATELINE}}</div>
  {{RECIPIENT_BLOCK}}
  <div class="role-title">Re: Application for {{ROLE_TITLE}}</div>


  {{GREETING_BLOCK}}
  <p>{{OPENING}}</p>
  <p>{{PROFILE_INTRO}}</p>

  {{ACHIEVEMENTS_BLOCK}}

  {{PROBLEMS_BLOCK}}
  {{CLOSING_BLOCK}}
  {{LANGUAGE_CLOSING_BLOCK}}
  {{FOOTNOTES_BLOCK}}
</body>
</html>
