<!-- career-ops-template
name: Bastion
description: Cover letter matching the Bastion CV — Carlito/Calibri, deep-pine masthead, single flat shaded Re-line bar
version: 0.1.0
date: 2026-07-08
origin: reactive-resume/leafish
atsRisk: none
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter — {{NAME}}</title>
<style>
  /* Bastion cover letter — masthead matches the Bastion CV exactly (Carlito/
     Calibri stack, deep-pine #1E4D40 name). The theme's flat shaded bar
     appears once: on the Re-line (.role-title). Everything else stays quiet. */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Disable fi/fl/ffi ligatures. Headless Chromium substitutes these letter
       pairs with the Unicode glyphs U+FB01/FB02/FB03 at PDF layout time, and PDF
       text extractors (what ATS systems read) decode them back to those
       codepoints, so "verification" becomes "veriﬁcation" and a literal keyword
       search misses it. Required ligatures (rlig) stay on. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: Carlito, Calibri, Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.65;
    color: #1A1A1A;
    background: #FFFFFF;
    /* Disable ligatures here as well; see the * rule above. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* ---- Masthead (exact carry-over from the Bastion CV) ---- */
  .name {
    font-weight: 700;
    font-size: 24pt;
    color: #1E4D40;
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .contact, .credentials {
    font-size: 10.5pt;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .contact a, .credentials a, .footnotes a {
    color: #1A1A1A;
    text-decoration: none;
  }

  .divider {
    border: none;
    border-top: 1px solid #C9D6D1;
    margin: 8px 0 10px;
  }

  /* ---- The theme's single shaded-bar moment: the Re-line ---- */
  .role-title {
    font-weight: 700;
    font-style: normal;
    letter-spacing: normal;
    text-transform: none;
    color: #1A1A1A;
    margin-top: 14px;
    margin-bottom: 6px;
  }

  .dateline {
    font-size: 10.5pt;
    color: #555555;
    margin-bottom: 14px;
  }

  .greeting {
    font-weight: 700;
    margin-bottom: 10px;
  }

  p {
    margin-bottom: 9px;
  }

  .achievements {
    list-style: none;
    margin-bottom: 5px;
  }

  .achievements li {
    margin-bottom: 5px;
    padding-left: 12px;
    position: relative;
  }

  .achievements li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #1A1A1A;
  }

  .language-closing {
    font-style: italic;
    margin-top: 4px;
    margin-bottom: 9px;
  }

  .footnotes {
    margin-top: 12px;
    padding-top: 5px;
    border-top: 1px solid #C9D6D1;
  }

  .footnotes p {
    font-size: 10pt;
    color: #555555;
    line-height: 1.4;
    margin-bottom: 3px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
  /* Recipient address block (business-letter form). Ink only: accent is
     forbidden on letter furniture. When {{RECIPIENT_BLOCK}} is empty the whole
     element is absent (no box, no dangling label, no collapsed gap) and the
     dateline's own bottom margin carries the date -> Re: -> salutation rhythm. */
  .recipient {
    margin: 0 0 12pt;
    color: #1A1A1A;
    line-height: 1.45;
  }
  .recipient div {
    margin: 0;
  }
</style>
</head>
<body>
  <div class="name">{{NAME}}</div>
  <div class="contact">{{CONTACT_LINE}}</div>
  {{CREDENTIALS_BLOCK}}
  <hr class="divider">
  <div class="dateline">{{DATELINE}}</div>
  {{RECIPIENT_BLOCK}}
  <div class="role-title">Re: Application for {{ROLE_TITLE}}</div>


  {{GREETING_BLOCK}}
  <p>{{OPENING}}</p>
  <p>{{PROFILE_INTRO}}</p>

  {{ACHIEVEMENTS_BLOCK}}

  {{PROBLEMS_BLOCK}}
  {{CLOSING_BLOCK}}
  {{LANGUAGE_CLOSING_BLOCK}}
  {{FOOTNOTES_BLOCK}}
</body>
</html>
