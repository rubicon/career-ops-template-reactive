<!-- career-ops-template
name: Harbor
description: Cover letter matching the Harbor CV — calm Cambria/Caladea serif, teal small-caps role line with text-width underline.
version: 0.1.0
date: 2026-07-08
origin: reactive-resume/glalie
atsRisk: none
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter — {{NAME}}</title>
<style>
  /* Harbor — cover-letter companion to cv-template.harbor.html. Same system
     serif stack (Cambria/Caladea/Georgia) and single teal accent #0F5E5E,
     scoped to the name and the small-caps role line with its text-width
     underline, so the letter renders as a visual match to the CV. */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Disable fi/fl/ffi ligatures. Headless Chromium substitutes these letter
       pairs with the Unicode glyphs U+FB01/FB02/FB03 at PDF layout time, and PDF
       text extractors (what ATS systems read) decode them back to those
       codepoints, so "verification" becomes "veriﬁcation" and a literal keyword
       search misses it. Required ligatures (rlig) stay on. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: Cambria, Caladea, Georgia, 'Times New Roman', serif;
    font-size: 11.5pt;
    line-height: 1.65;
    color: #1A1A1A;
    background: #ffffff;
    /* Disable ligatures here as well; see the * rule above. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  /* Masthead matches the Harbor CV exactly: teal serif name, no rule. */
  .name {
    font-family: Cambria, Caladea, Georgia, 'Times New Roman', serif;
    font-size: 25pt;
    font-weight: 600;
    color: #0F5E5E;
    letter-spacing: 0.01em;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .contact, .credentials {
    font-size: 10.5pt;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .contact a, .credentials a, .footnotes a {
    color: #1A1A1A;
    text-decoration: none;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  .divider {
    border: none;
    border-top: 1px solid #cccccc;
    margin: 8px 0 10px;
  }

  /* The theme's device: teal small-caps line, underline spans the text only
     (a border-bottom on an inline-block span, never a glyph). */
  .role-title {
    font-weight: 700;
    font-style: normal;
    letter-spacing: normal;
    text-transform: none;
    color: #1A1A1A;
    margin-top: 14px;
    margin-bottom: 5px;
  }

  .role-title span {
    border: 0;
    padding: 0;
    letter-spacing: normal;
  }

  .dateline {
    font-style: italic;
    font-size: 10.5pt;
    color: #1A1A1A;
    margin-bottom: 16px;
  }

  .greeting {
    margin-bottom: 12px;
  }

  p {
    margin-bottom: 9px;
  }

  /* Quiet en-dash bullets, matching the CV (single glyph via CSS content). */
  .achievements {
    list-style: none;
    margin: 2px 0 9px;
  }

  .achievements li {
    margin-bottom: 5px;
    padding-left: 12px;
    position: relative;
    line-height: 1.55;
  }

  .achievements li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #1A1A1A;
  }

  .achievements li strong {
    font-weight: 700;
  }

  .language-closing {
    font-style: italic;
    margin-top: 4px;
    margin-bottom: 9px;
  }

  .footnotes {
    margin-top: 12px;
    padding-top: 5px;
    border-top: 1px solid #cccccc;
  }

  .footnotes p {
    font-size: 10pt;
    color: #666;
    line-height: 1.4;
    margin-bottom: 3px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

  /* === RTL (Arabic) Support === */
  html[lang="ar"] body {
    direction: rtl;
    text-align: right;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .name,
  html[lang="ar"] .role-title {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .achievements li {
    padding-right: 12px;
    padding-left: 0;
  }

  html[lang="ar"] .achievements li::before {
    right: 0;
    left: auto;
  }

  /* === CJK (Japanese) font fallback === */
  /* Harbor's Latin serif stack stays first so ASCII keeps the Cambria/Caladea
     voice, then the browser's per-glyph fallback picks the first installed
     CJK serif face for kana and kanji. Mirrors the CV template. */
  html[lang="ja"] body {
    font-family: Cambria, Caladea, Georgia, 'Times New Roman', 'Hiragino Mincho ProN',
      'Yu Mincho', 'YuMincho', 'Noto Serif CJK JP', 'Noto Serif JP',
      'MS PMincho', serif;
  }

  html[lang="ja"] .name,
  html[lang="ja"] .role-title {
    font-family: Cambria, Caladea, Georgia, 'Times New Roman', 'Hiragino Mincho ProN',
      'Yu Mincho', 'YuMincho', 'Noto Serif CJK JP', 'Noto Serif JP',
      'MS PMincho', serif;
  }
  /* Recipient address block (business-letter form). Ink only: accent is
     forbidden on letter furniture. When {{RECIPIENT_BLOCK}} is empty the whole
     element is absent (no box, no dangling label, no collapsed gap) and the
     dateline's own bottom margin carries the date -> Re: -> salutation rhythm. */
  .recipient {
    margin: 0 0 12pt;
    color: #1A1A1A;
    line-height: 1.45;
  }
  .recipient div {
    margin: 0;
  }
</style>
</head>
<body>
  <div class="name">{{NAME}}</div>
  <div class="contact">{{CONTACT_LINE}}</div>
  {{CREDENTIALS_BLOCK}}
  <hr class="divider">
  <div class="dateline">{{DATELINE}}</div>
  {{RECIPIENT_BLOCK}}
  <div class="role-title"><span>Re: Application for {{ROLE_TITLE}}</span></div>


  {{GREETING_BLOCK}}
  <p>{{OPENING}}</p>
  <p>{{PROFILE_INTRO}}</p>

  {{ACHIEVEMENTS_BLOCK}}

  {{PROBLEMS_BLOCK}}
  {{CLOSING_BLOCK}}
  {{LANGUAGE_CLOSING_BLOCK}}
  {{FOOTNOTES_BLOCK}}
</body>
</html>
