<!-- career-ops-template
name: Cadence
description: Cover letter matching the Cadence CV: Helvetica, indigo, uppercase letterspaced labels, indigo rules.
version: 0.1.0
date: 2026-07-08
origin: reactive-resume/meowth
atsRisk: none
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter — {{NAME}}</title>
<style>
  /* ==========================================================================
     Cadence — cover letter companion to cv-template.cadence.html. Same
     Helvetica system stack and single indigo accent #33356B (name, dateline /
     role labels, rules only), so the letter renders as a visual match to the
     CV masthead. ATS-strict: single column, system fonts, ligatures disabled.
     ========================================================================== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Disable fi/fl/ffi ligatures. Headless Chromium substitutes these letter
       pairs with the Unicode glyphs U+FB01/FB02/FB03 at PDF layout time, and PDF
       text extractors (what ATS systems read) decode them back to those
       codepoints, so "verification" becomes "veriﬁcation" and a literal keyword
       search misses it. Required ligatures (rlig) stay on. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, 'Liberation Sans', sans-serif;
    font-size: 11.5pt;
    line-height: 1.6;
    color: #1A1A1A;
    background: #FFFFFF;
    /* Disable ligatures here as well; see the * rule above. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  .name {
    font-family: 'Helvetica Neue', Helvetica, Arial, 'Liberation Sans', sans-serif;
    font-size: 26pt;
    font-weight: 700;
    color: #33356B;
    letter-spacing: 0.005em;
    line-height: 1.15;
    margin-bottom: 3px;
  }

  .contact, .credentials {
    font-size: 10.5pt;
    color: #1A1A1A;
    letter-spacing: 0.01em;
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .contact a, .credentials a, .footnotes a {
    color: #1A1A1A;
    text-decoration: none;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* Cadence divider device: the CV masthead's solid indigo rule. */
  .divider {
    border: none;
    border-top: 2px solid #33356B;
    margin: 8px 0 10px;
  }

  .role-title {
    font-weight: 700;
    font-style: normal;
    letter-spacing: normal;
    text-transform: none;
    color: #1A1A1A;
    margin-top: 16px;
    margin-bottom: 4px;
  }

  .dateline {
    font-size: 10.5pt;
    font-weight: 700;
    color: #33356B;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }

  .greeting {
    font-weight: 600;
    margin-bottom: 10px;
  }

  p {
    margin-bottom: 8px;
  }

  .achievements {
    list-style: none;
    margin-bottom: 6px;
  }

  .achievements li {
    margin-bottom: 5px;
    padding-left: 13px;
    position: relative;
    line-height: 1.55;
  }

  .achievements li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #1A1A1A;
    font-weight: 700;
  }

  .achievements li strong {
    color: #1A1A1A;
    font-weight: 700;
  }

  .language-closing {
    font-style: italic;
    margin-top: 4px;
    margin-bottom: 8px;
  }

  .footnotes {
    margin-top: 12px;
    padding-top: 5px;
    border-top: 1px solid #33356B;
  }

  .footnotes p {
    font-size: 10pt;
    color: #666666;
    line-height: 1.4;
    margin-bottom: 3px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

  /* === RTL (Arabic) Support === */
  html[lang="ar"] body {
    direction: rtl;
    text-align: right;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .name,
  html[lang="ar"] .role-title,
  html[lang="ar"] .dateline,
  html[lang="ar"] .greeting {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .achievements li {
    padding-right: 13px;
    padding-left: 0;
  }

  html[lang="ar"] .achievements li::before {
    right: 0;
    left: auto;
  }

  /* === CJK (Japanese) font fallback === */
  /* Without a CJK fallback, Japanese text renders as tofu (□) in headless
     Chromium on any system without a CJK system font (Linux/CI, minimal
     containers). The Latin theme stack is kept first so ASCII still uses the
     Helvetica family, then the browser's per-glyph fallback picks the first
     installed CJK face for kana and kanji. Mirrors the lang="ar" precedent. */
  html[lang="ja"] body {
    font-family: 'Helvetica Neue', Helvetica, Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Noto Sans JP',
      Meiryo, 'MS PGothic', sans-serif;
  }

  html[lang="ja"] .name,
  html[lang="ja"] .role-title,
  html[lang="ja"] .dateline,
  html[lang="ja"] .greeting {
    font-family: 'Helvetica Neue', Helvetica, Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Noto Sans JP',
      Meiryo, 'MS PGothic', sans-serif;
  }
  /* Recipient address block (business-letter form). Ink only: accent is
     forbidden on letter furniture. When {{RECIPIENT_BLOCK}} is empty the whole
     element is absent (no box, no dangling label, no collapsed gap) and the
     dateline's own bottom margin carries the date -> Re: -> salutation rhythm. */
  .recipient {
    margin: 0 0 12pt;
    color: #1A1A1A;
    line-height: 1.45;
  }
  .recipient div {
    margin: 0;
  }
</style>
</head>
<body>
  <div class="name">{{NAME}}</div>
  <div class="contact">{{CONTACT_LINE}}</div>
  {{CREDENTIALS_BLOCK}}
  <hr class="divider">
  <div class="dateline">{{DATELINE}}</div>
  {{RECIPIENT_BLOCK}}
  <div class="role-title">Re: Application for {{ROLE_TITLE}}</div>


  {{GREETING_BLOCK}}
  <p>{{OPENING}}</p>
  <p>{{PROFILE_INTRO}}</p>

  {{ACHIEVEMENTS_BLOCK}}

  {{PROBLEMS_BLOCK}}
  {{CLOSING_BLOCK}}
  {{LANGUAGE_CLOSING_BLOCK}}
  {{FOOTNOTES_BLOCK}}
</body>
</html>
