<!-- career-ops-template
name: Fern
description: Grounded and methodical: Tahoma, forest-green small-caps headers over muted hairline rules.
version: 0.1.0
date: 2026-07-08
origin: reactive-resume/chikorita
atsRisk: none
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter — {{NAME}}</title>
<style>
  /* Fern cover letter — masthead matches the Fern CV exactly (Tahoma stack,
     forest-green name, solid forest rule); structural moments (role line,
     dateline) use the CV's small-caps + hairline header voice. */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Disable fi/fl/ffi ligatures. Headless Chromium substitutes these letter
       pairs with the Unicode glyphs U+FB01/FB02/FB03 at PDF layout time, and PDF
       text extractors (what ATS systems read) decode them back to those
       codepoints, so "verification" becomes "veriﬁcation" and a literal keyword
       search misses it. Required ligatures (rlig) stay on. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: Tahoma, Verdana, 'DejaVu Sans', sans-serif;
    font-size: 11pt;
    line-height: 1.65;
    color: #1A1A1A;
    background: #FFFFFF;
    /* Disable ligatures here as well; see the * rule above. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  .name {
    font-weight: 700;
    font-size: 24pt;
    line-height: 1.2;
    color: #2D5A27;
    margin-bottom: 4px;
  }

  .contact, .credentials {
    font-size: 10pt;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .contact a, .credentials a, .footnotes a {
    color: #1A1A1A;
    text-decoration: none;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* Fern's masthead device: the solid forest rule from the CV header,
     rendered as a border (never a glyph). */
  .divider {
    border: none;
    border-top: 1.5px solid #2D5A27;
    margin: 9px 0 20px;
  }

  .role-title {
    font-weight: 700;
    font-style: normal;
    letter-spacing: normal;
    text-transform: none;
    color: #1A1A1A;
    margin-top: 12px;
    margin-bottom: 4px;
  }

  .dateline {
    font-size: 10pt;
    color: #4A4A4A;
    margin-bottom: 16px;
  }

  .greeting {
    margin-bottom: 12px;
  }

  p {
    margin-bottom: 9px;
    text-align: left;
  }

  .achievements {
    list-style: none;
    margin-bottom: 6px;
  }

  .achievements li {
    margin-bottom: 5px;
    padding-left: 11px;
    position: relative;
  }

  .achievements li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #1A1A1A;
  }

  .language-closing {
    font-style: italic;
    margin-top: 4px;
    margin-bottom: 9px;
  }

  .footnotes {
    margin-top: 12px;
    padding-top: 5px;
    border-top: 1px solid #C9D4C7;
  }

  .footnotes p {
    font-size: 10pt;
    color: #4A4A4A;
    line-height: 1.4;
    margin-bottom: 3px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

  /* === PAGE BREAK CONTROL === */
  .name,
  .role-title,
  .greeting {
    break-after: avoid;
    page-break-after: avoid;
  }

  .achievements li {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  /* === RTL (Arabic) Support === */
  html[lang="ar"] body {
    direction: rtl;
    text-align: right;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .achievements li {
    padding-right: 11px;
    padding-left: 0;
  }

  html[lang="ar"] .achievements li::before {
    right: 0;
    left: auto;
  }

  /* === CJK (Japanese) font fallback === */
  /* Latin theme stack first so ASCII still uses Tahoma/Verdana, then the
     browser's per-glyph fallback picks the first installed CJK face. */
  html[lang="ja"] body {
    font-family: Tahoma, Verdana, 'DejaVu Sans', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Noto Sans JP',
      Meiryo, 'MS PGothic', sans-serif;
  }
  /* Recipient address block (business-letter form). Ink only: accent is
     forbidden on letter furniture. When {{RECIPIENT_BLOCK}} is empty the whole
     element is absent (no box, no dangling label, no collapsed gap) and the
     dateline's own bottom margin carries the date -> Re: -> salutation rhythm. */
  .recipient {
    margin: 0 0 12pt;
    color: #1A1A1A;
    line-height: 1.45;
  }
  .recipient div {
    margin: 0;
  }
</style>
</head>
<body>
  <div class="name">{{NAME}}</div>
  <div class="contact">{{CONTACT_LINE}}</div>
  {{CREDENTIALS_BLOCK}}
  <hr class="divider">
  <div class="dateline">{{DATELINE}}</div>
  {{RECIPIENT_BLOCK}}
  <div class="role-title">Re: Application for {{ROLE_TITLE}}</div>


  {{GREETING_BLOCK}}
  <p>{{OPENING}}</p>
  <p>{{PROFILE_INTRO}}</p>

  {{ACHIEVEMENTS_BLOCK}}

  {{PROBLEMS_BLOCK}}
  {{CLOSING_BLOCK}}
  {{LANGUAGE_CLOSING_BLOCK}}
  {{FOOTNOTES_BLOCK}}
</body>
</html>
