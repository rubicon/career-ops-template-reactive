<!-- career-ops-template
name: Laurel
description: Prestige serif: Times, antique-gold page-top hairline and small-caps headers.
version: 0.1.0
date: 2026-07-08
origin: reactive-resume/pikachu
atsRisk: none
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter — {{NAME}}</title>
<style>
  /* Laurel — prestige serif cover letter. Masthead matches the Laurel CV:
     Times stack, antique-gold (#806000) small-caps name and structural
     moments, gold page-top hairline (a border on the body). */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Disable fi/fl/ffi ligatures. Headless Chromium substitutes these letter
       pairs with the Unicode glyphs U+FB01/FB02/FB03 at PDF layout time, and PDF
       text extractors (what ATS systems read) decode them back to those
       codepoints, so "verification" becomes "veriﬁcation" and a literal keyword
       search misses it. Required ligatures (rlig) stay on. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'Times New Roman', Tinos, Times, serif;
    font-size: 10.5pt;
    line-height: 1.55;
    color: #1A1A1A;
    background: #ffffff;
    /* Theme device: the antique-gold page-top hairline (the base cover has
       no .page wrapper, so the hairline lives on the body). */
    border-top: 1.5px solid #806000;
    padding-top: 8pt;
    /* Disable ligatures here as well; see the * rule above. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  .name {
    font-weight: 700;
    font-size: 16pt;
    font-variant: small-caps;
    letter-spacing: 0.04em;
    color: #806000;
    line-height: 1.2;
    margin-bottom: 3pt;
  }

  .contact, .credentials {
    font-size: 10pt;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 2pt;
  }

  .contact a, .credentials a, .footnotes a {
    color: #1A1A1A;
    text-decoration: none;
  }

  /* Theme device replaces the plain divider: the CV's soft antique rule. */
  .divider {
    border: none;
    border-top: 1pt solid #E3D9BD;
    margin: 8pt 0 10pt;
  }

  .role-title {
    font-weight: 700;
    font-style: normal;
    letter-spacing: normal;
    text-transform: none;
    color: #1A1A1A;
    margin-top: 10pt;
    margin-bottom: 2pt;
  }

  .dateline {
    font-size: 10pt;
    font-variant: small-caps;
    letter-spacing: 0.06em;
    color: #806000;
    margin-bottom: 12pt;
  }

  .greeting {
    font-weight: 700;
    margin-bottom: 8pt;
  }

  p {
    margin-bottom: 8pt;
  }

  .achievements {
    list-style: none;
    margin-bottom: 4pt;
  }

  .achievements li {
    margin-bottom: 5pt;
    padding-left: 12pt;
    position: relative;
  }

  .achievements li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #1A1A1A;
  }

  .language-closing {
    font-style: italic;
    margin-top: 4pt;
    margin-bottom: 8pt;
  }

  .footnotes {
    margin-top: 10pt;
    padding-top: 4pt;
    border-top: 0.5pt solid #E3D9BD;
  }

  .footnotes p {
    font-size: 10pt;
    color: #555555;
    line-height: 1.35;
    margin-bottom: 3pt;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }
  /* Recipient address block (business-letter form). Ink only: accent is
     forbidden on letter furniture. When {{RECIPIENT_BLOCK}} is empty the whole
     element is absent (no box, no dangling label, no collapsed gap) and the
     dateline's own bottom margin carries the date -> Re: -> salutation rhythm. */
  .recipient {
    margin: 0 0 12pt;
    color: #1A1A1A;
    line-height: 1.45;
  }
  .recipient div {
    margin: 0;
  }
</style>
</head>
<body>
  <div class="name">{{NAME}}</div>
  <div class="contact">{{CONTACT_LINE}}</div>
  {{CREDENTIALS_BLOCK}}
  <hr class="divider">
  <div class="dateline">{{DATELINE}}</div>
  {{RECIPIENT_BLOCK}}
  <div class="role-title">Re: Application for {{ROLE_TITLE}}</div>


  {{GREETING_BLOCK}}
  <p>{{OPENING}}</p>
  <p>{{PROFILE_INTRO}}</p>

  {{ACHIEVEMENTS_BLOCK}}

  {{PROBLEMS_BLOCK}}
  {{CLOSING_BLOCK}}
  {{LANGUAGE_CLOSING_BLOCK}}
  {{FOOTNOTES_BLOCK}}
</body>
</html>
