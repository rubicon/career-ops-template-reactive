<!-- career-ops-template
name: Herald
description: Assertive name-band: Helvetica, oversized burgundy name over a heavy rule, 3-column grid.
version: 0.1.0
date: 2026-07-08
origin: reactive-resume/ditto
atsRisk: none
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter — {{NAME}}</title>
<style>
  /* Herald cover letter — masthead identical to the Herald CV: oversized
     uppercase burgundy name over a heavy 3px rule. Letter body stays quiet
     near-black; hairlines at most below the band. */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Disable fi/fl/ffi ligatures. Headless Chromium substitutes these letter
       pairs with the Unicode glyphs U+FB01/FB02/FB03 at PDF layout time, and PDF
       text extractors (what ATS systems read) decode them back to those
       codepoints, so "verification" becomes "veriﬁcation" and a literal keyword
       search misses it. Required ligatures (rlig) stay on. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11.5pt;
    line-height: 1.65;
    color: #1A1A1A;
    background: #FFFFFF;
    /* Disable ligatures here as well; see the * rule above. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  /* === MASTHEAD (matches the Herald CV name-band) === */
  .name {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 30pt;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #6E1E2B;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .contact, .credentials {
    font-size: 10.5pt;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .contact a, .credentials a, .footnotes a {
    color: #1A1A1A;
    text-decoration: none;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* The Herald heavy rule — the CV name-band device as the letterhead divider. */
  .divider {
    border: none;
    border-top: 3px solid #6E1E2B;
    margin: 8px 0 10px;
  }

  .role-title {
    font-weight: 700;
    font-style: normal;
    letter-spacing: normal;
    text-transform: none;
    color: #1A1A1A;
    margin-top: 22px;
    margin-bottom: 4px;
  }

  .dateline {
    font-size: 10.5pt;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #1A1A1A;
    margin-bottom: 18px;
  }

  .greeting {
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 10px;
  }

  p {
    text-align: left;
    margin-bottom: 9px;
  }

  .achievements {
    list-style: none;
    margin-bottom: 6px;
  }

  .achievements li {
    position: relative;
    padding-left: 12px;
    margin-bottom: 4px;
  }

  .achievements li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #1A1A1A;
  }

  .language-closing {
    font-style: italic;
    margin-top: 4px;
    margin-bottom: 9px;
  }

  .footnotes {
    margin-top: 12px;
    padding-top: 4px;
    border-top: 1px solid #E0D5D7;
  }

  .footnotes p {
    font-size: 10pt;
    color: #555555;
    line-height: 1.4;
    margin-bottom: 3px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

  /* === PAGE BREAK CONTROL === */
  .name,
  .achievements li {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .role-title,
  .greeting {
    break-after: avoid;
    page-break-after: avoid;
  }

  /* === RTL (Arabic) Support === */
  html[lang="ar"] body {
    direction: rtl;
    text-align: right;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .name,
  html[lang="ar"] .role-title,
  html[lang="ar"] .dateline,
  html[lang="ar"] .greeting {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .achievements li {
    padding-right: 12px;
    padding-left: 0;
  }

  html[lang="ar"] .achievements li::before {
    right: 0;
    left: auto;
  }

  /* === CJK (Japanese) font fallback === */
  /* Latin theme stack stays first so ASCII keeps Helvetica; the browser's
     per-glyph fallback picks the first installed CJK face for kana/kanji. */
  html[lang="ja"] body {
    font-family: 'Helvetica Neue', Helvetica, Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Noto Sans JP',
      Meiryo, 'MS PGothic', sans-serif;
  }

  html[lang="ja"] .name,
  html[lang="ja"] .role-title,
  html[lang="ja"] .dateline,
  html[lang="ja"] .greeting {
    font-family: 'Helvetica Neue', Helvetica, Arial, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Noto Sans JP',
      Meiryo, 'MS PGothic', sans-serif;
  }
  /* Recipient address block (business-letter form). Ink only: accent is
     forbidden on letter furniture. When {{RECIPIENT_BLOCK}} is empty the whole
     element is absent (no box, no dangling label, no collapsed gap) and the
     dateline's own bottom margin carries the date -> Re: -> salutation rhythm. */
  .recipient {
    margin: 0 0 12pt;
    color: #1A1A1A;
    line-height: 1.45;
  }
  .recipient div {
    margin: 0;
  }
</style>
</head>
<body>
  <div class="name">{{NAME}}</div>
  <div class="contact">{{CONTACT_LINE}}</div>
  {{CREDENTIALS_BLOCK}}
  <hr class="divider">
  <div class="dateline">{{DATELINE}}</div>
  {{RECIPIENT_BLOCK}}
  <div class="role-title">Re: Application for {{ROLE_TITLE}}</div>


  {{GREETING_BLOCK}}
  <p>{{OPENING}}</p>
  <p>{{PROFILE_INTRO}}</p>

  {{ACHIEVEMENTS_BLOCK}}

  {{PROBLEMS_BLOCK}}
  {{CLOSING_BLOCK}}
  {{LANGUAGE_CLOSING_BLOCK}}
  {{FOOTNOTES_BLOCK}}
</body>
</html>
