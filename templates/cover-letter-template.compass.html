<!-- career-ops-template
name: Compass
description: Cover letter matching the Compass CV — compact Verdana, slate-navy uppercase structural moments, lean spacing.
version: 0.1.0
date: 2026-07-08
origin: reactive-resume/ditgar
atsRisk: none
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cover Letter — {{NAME}}</title>
<style>
  /* Compass — cover-letter companion to cv-template.compass.html. Same Verdana
     stack, same slate-navy (#2C3E60) masthead (name + 2px rule) and uppercase
     structural moments (role line, dateline); body stays near-black ink at the
     mock's paragraph rhythm. Single column, ATS-strict. */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* Disable fi/fl/ffi ligatures. Headless Chromium substitutes these letter
       pairs with the Unicode glyphs U+FB01/FB02/FB03 at PDF layout time, and PDF
       text extractors (what ATS systems read) decode them back to those
       codepoints, so "verification" becomes "veriﬁcation" and a literal keyword
       search misses it. Required ligatures (rlig) stay on. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: Verdana, Tahoma, 'DejaVu Sans', sans-serif;
    font-size: 10.5pt;
    line-height: 1.6;
    color: #1A1A1A;
    background: #ffffff;
    /* Disable ligatures here as well; see the * rule above. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  /* === MASTHEAD (matches the Compass CV) === */
  .name {
    font-family: Verdana, Tahoma, 'DejaVu Sans', sans-serif;
    font-size: 22pt;
    font-weight: 700;
    color: #2C3E60;
    letter-spacing: 0.02em;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .contact, .credentials {
    font-size: 10pt;
    color: #1A1A1A;
    line-height: 1.4;
    margin-bottom: 2px;
  }

  .contact a, .credentials a, .footnotes a {
    color: #1A1A1A;
    text-decoration: none;
  }

  /* Links must never break across lines */
  a {
    white-space: nowrap;
  }

  /* The Compass masthead rule — the CV header's 2px slate-navy border,
     rendered here as the divider (a border, never a glyph). */
  .divider {
    border: none;
    border-top: 2px solid #2C3E60;
    margin: 8px 0 24px;
  }

  /* === STRUCTURAL MOMENTS (uppercase, no rules — matches CV headers) === */
  .role-title {
    font-weight: 700;
    font-style: normal;
    letter-spacing: normal;
    text-transform: none;
    color: #1A1A1A;
    margin-top: 2px;
    margin-bottom: 6px;
  }

  .dateline {
    font-weight: 700;
    font-size: 10pt;
    color: #2C3E60;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 22px;
  }

  /* === LETTER BODY === */
  .greeting {
    font-size: 10.5pt;
    font-weight: 700;
    margin-bottom: 14px;
  }

  p {
    font-size: 10.5pt;
    margin-bottom: 8px;
  }

  .achievements {
    list-style: none;
    margin: 2px 0 8px;
  }

  .achievements li {
    font-size: 10.5pt;
    line-height: 1.6;
    padding-left: 12px;
    position: relative;
    margin-bottom: 4px;
  }

  .achievements li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #1A1A1A;
  }

  .language-closing {
    font-style: italic;
    margin-top: 4px;
    margin-bottom: 8px;
  }

  .footnotes {
    margin-top: 12px;
    padding-top: 5px;
    border-top: 1px solid #cccccc;
  }

  .footnotes p {
    font-size: 10pt;
    color: #555;
    line-height: 1.4;
    margin-bottom: 3px;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

  /* === PAGE BREAK CONTROL === */
  .name,
  .role-title,
  .greeting {
    break-after: avoid;
    page-break-after: avoid;
  }

  .achievements li {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  /* === RTL (Arabic) Support === */
  html[lang="ar"] body {
    direction: rtl;
    text-align: right;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .name,
  html[lang="ar"] .role-title,
  html[lang="ar"] .dateline,
  html[lang="ar"] .greeting {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  }

  html[lang="ar"] .achievements li {
    padding-right: 12px;
    padding-left: 0;
  }

  html[lang="ar"] .achievements li::before {
    right: 0;
    left: auto;
  }

  /* === CJK (Japanese) font fallback === */
  /* Without a CJK fallback, Japanese text renders as tofu (□) in headless
     Chromium on any system without a CJK system font (Linux/CI, minimal
     containers). The Latin theme stack is kept first so ASCII still uses
     Verdana, then the browser's per-glyph fallback picks the first installed
     CJK face for kana and kanji. Mirrors the lang="ar" precedent above. */
  html[lang="ja"] body {
    font-family: Verdana, Tahoma, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Noto Sans JP',
      Meiryo, 'MS PGothic', sans-serif;
  }

  html[lang="ja"] .name,
  html[lang="ja"] .role-title,
  html[lang="ja"] .dateline,
  html[lang="ja"] .greeting {
    font-family: Verdana, Tahoma, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN',
      'Yu Gothic', 'YuGothic', 'Noto Sans CJK JP', 'Noto Sans JP',
      Meiryo, 'MS PGothic', sans-serif;
  }
  /* Recipient address block (business-letter form). Ink only: accent is
     forbidden on letter furniture. When {{RECIPIENT_BLOCK}} is empty the whole
     element is absent (no box, no dangling label, no collapsed gap) and the
     dateline's own bottom margin carries the date -> Re: -> salutation rhythm. */
  .recipient {
    margin: 0 0 12pt;
    color: #1A1A1A;
    line-height: 1.45;
  }
  .recipient div {
    margin: 0;
  }
</style>
</head>
<body>
  <div class="name">{{NAME}}</div>
  <div class="contact">{{CONTACT_LINE}}</div>
  {{CREDENTIALS_BLOCK}}
  <hr class="divider">
  <div class="dateline">{{DATELINE}}</div>
  {{RECIPIENT_BLOCK}}
  <div class="role-title">Re: Application for {{ROLE_TITLE}}</div>


  {{GREETING_BLOCK}}
  <p>{{OPENING}}</p>
  <p>{{PROFILE_INTRO}}</p>

  {{ACHIEVEMENTS_BLOCK}}

  {{PROBLEMS_BLOCK}}
  {{CLOSING_BLOCK}}
  {{LANGUAGE_CLOSING_BLOCK}}
  {{FOOTNOTES_BLOCK}}
</body>
</html>
