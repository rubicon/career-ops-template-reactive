name: Feature request
description: Suggest an improvement or a new capability
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Please open a feature request before starting work, so the approach can
        be agreed on first. This pack stays focused on single-column, ATS-safe
        CV and cover-letter templates.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish, and what is missing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This keeps templates single-column, ATS-safe, and validator-clean.
          required: true
